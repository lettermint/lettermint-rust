name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to release without the leading v
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Ensure rust-version tracks current stable
        run: |
          STABLE_MINOR="$(rustc --version | awk '{ print $2 }' | cut -d. -f1,2)"
          MSRV_MINOR="$(sed -n 's/^rust-version = "\([0-9.]*\)"/\1/p' Cargo.toml | cut -d. -f1,2)"
          test "$MSRV_MINOR" = "$STABLE_MINOR"

      - name: Update crate version
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.version }}"/' Cargo.toml

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Package
        run: cargo package --locked --allow-dirty

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
