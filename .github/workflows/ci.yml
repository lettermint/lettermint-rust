name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Ensure rust-version tracks current stable
        run: |
          STABLE_MINOR="$(rustc --version | awk '{ print $2 }' | cut -d. -f1,2)"
          MSRV_MINOR="$(sed -n 's/^rust-version = "\([0-9.]*\)"/\1/p' Cargo.toml | cut -d. -f1,2)"
          test "$MSRV_MINOR" = "$STABLE_MINOR"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Verify package
        run: cargo package --locked --allow-dirty

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run dependency audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: Scan for common secret patterns
        run: |
          ! grep -REn \
            'AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|sk_(live|test)_[A-Za-z0-9]+|ghp_[A-Za-z0-9_]+|github_pat_[A-Za-z0-9_]+|xox[baprs]-[A-Za-z0-9-]+|-----BEGIN (RSA|DSA|EC|OPENSSH|PRIVATE) KEY' \
            src tests README.md CHANGELOG.md Cargo.toml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build package
        run: cargo package --locked --allow-dirty

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: target/package/*.crate
          retention-days: 7
